services:
  gluetun_protonvpn-ovpn:
    #image: qmcgaw/gluetun:latest
    image: qmcgaw/gluetun:v3.41.0
    container_name: gluetun_protonvpn
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - OPENVPN_USER=${GLUETUN_OVPN_USERNAME} # Add +pmp to the username
      - OPENVPN_PASSWORD=${GLUETUN_OVPN_PASSWORD}
      - UPDATER_PERIOD=1h
      - UPDATER_VPN_SERVICE_PROVIDERS=protonvpn
      #- UPDATER_PROTONVPN_PASSWORD=${GLUETUN_UPDATER_PROTONVPN_PASSWORD}
      #- UPDATER_PROTONVPN_USERNAME=${GLUETUN_UPDATER_PROTONVPN_USERNAME}
      - VPN_PORT_FORWARDING=on
      - VPN_SERVICE_PROVIDER=protonvpn
      - SERVER_COUNTRIES=${GLUETUN_SERVER_COUNTRIES}
    ports:
      - 49893:49893 # qbitorrent WebUI
      #- 6881:6881 # qbittorrent listening port for TCP
      #- 6881:6881/udp # qbittorrent listening port UDP
    volumes:
      - ${LOCAL_PREFIX-/volume1/Docker}/gluetun:/gluetun
    logging:
      driver: loki
      options:
        loki-url: "http://loki.${NETWORK_DOMAIN-bricksandblocks.net}:3100/loki/api/v1/push"
        loki-retries: 5
        max-size: 100m
        mode: "non-blocking"

  qbittorrent:
     image: lscr.io/linuxserver/qbittorrent:latest
     container_name: qbittorrent
     restart: unless-stopped
     network_mode: "service:gluetun_protonvpn-ovpn"
     depends_on:
       gluetun_protonvpn-ovpn:
         condition: service_started
     environment:
       - PUID=1028 # 'staff' user
       - PGID=50 # 'staff' group
       - DOCKER_MODS=ghcr.io/t-anc/gsp-qbittorent-gluetun-sync-port-mod:main
       - GSP_GTN_API_KEY=${GSP_GTN_API_KEY}
       - GSP_MINIMAL_LOGS=false
       #- TORRENTING_PORT="${QBITTORRENT_TOR_PORT}"
       - TZ=America/Los_Angeles
       - WEBUI_PORT=${QBITTORRENT_WEBUI-49893}
     volumes:
       - ${LOCAL_PREFIX-/volume1/Docker}/qbittorrent/config:/config
       - ${MEDIA_PREFIX-/volume1/Media}/downloads:/data/downloads
     logging:
       driver: loki
       options:
         loki-url: "http://loki.${NETWORK_DOMAIN-bricksandblocks.net}:3100/loki/api/v1/push"
         loki-retries: 5
         max-size: 100m
         mode: "non-blocking"
